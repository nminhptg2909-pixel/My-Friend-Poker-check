<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♠ GARINI Poker Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #0b0c0f;
  --bg2:       #111318;
  --bg3:       #181a20;
  --bg4:       #1e2028;
  --border:    rgba(200,168,75,.28);
  --border2:   rgba(200,168,75,.12);
  --gold:      #c8a84b;
  --gold2:     #e8c96a;
  --gold3:     #f5e09a;
  --gold-glow: rgba(200,168,75,.18);
  --text:      #ffffff;
  --text2:     rgba(255,255,255,.75);
  --text3:     rgba(255,255,255,.4);
  --green:     #4a8c5c;
  --green-lt:  rgba(74,140,92,.15);
  --red:       #c05050;
  --red-lt:    rgba(192,80,80,.15);
  --radius:    10px;
  --font:      'Montserrat', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  padding:14px;
  color:var(--text);
  max-width:500px;
  margin:0 auto;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(45deg,rgba(200,168,75,.025) 0px,transparent 1px,transparent 18px,rgba(200,168,75,.025) 19px),
    repeating-linear-gradient(-45deg,rgba(200,168,75,.025) 0px,transparent 1px,transparent 18px,rgba(200,168,75,.025) 19px);
}
body>*{position:relative;z-index:1;}

/* HEADER */
.app-header{text-align:center;padding:18px 0 14px;margin-bottom:4px;}
.app-logo{font-size:10px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--gold);opacity:.6;margin-bottom:6px;}
.app-title{
  font-size:28px;font-weight:800;letter-spacing:4px;
  background:linear-gradient(135deg,#9a7830 0%,#c8a84b 25%,#f0d878 50%,#c8a84b 75%,#9a7830 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(200,168,75,.3));
}
.app-divider{display:flex;align-items:center;gap:10px;margin:10px auto 0;max-width:260px;}
.app-divider::before,.app-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.app-divider-icon{font-size:11px;color:var(--gold);opacity:.5;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px;}
.tab{flex:1;padding:8px 2px;font-size:10px;font-weight:700;text-align:center;border-radius:7px;cursor:pointer;background:transparent;color:var(--text3);transition:all .2s;letter-spacing:.5px;text-transform:uppercase;font-family:var(--font);border:1px solid transparent;}
.tab.active{background:linear-gradient(135deg,#1e1a0e,#2a2210);color:var(--gold2);border-color:var(--border);box-shadow:0 0 12px var(--gold-glow);}
.page{display:none;}.page.show{display:block;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.25;}
.card-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border2);opacity:.85;}

/* DATE PICKER BANNER */
.session-date-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:10px 13px;margin-bottom:12px;
}
.session-date-bar .cal-icon{font-size:18px;flex-shrink:0;}
.session-date-bar .date-label{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.session-date-bar input[type=date]{
  flex:1;background:transparent;border:none;
  color:var(--text);font-family:var(--font);font-size:14px;font-weight:600;
  outline:none;cursor:pointer;
  color-scheme:dark;
}
.session-date-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(3) hue-rotate(5deg);opacity:.7;cursor:pointer;}

/* FORM */
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.form-row label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:60px;font-weight:600;letter-spacing:.3px;}
input[type=text],input[type=number]{
  flex:1;padding:9px 12px;font-size:13px;font-weight:500;
  border:1px solid var(--border);border-radius:8px;
  min-width:80px;background:var(--bg3);
  color:var(--text);font-family:var(--font);
}
input[type=text]::placeholder,input[type=number]::placeholder{color:var(--text3);}
input:focus{border-color:var(--gold);outline:none;background:var(--bg4);box-shadow:0 0 8px var(--gold-glow);}

.btn-gold{width:100%;padding:11px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#7a5c1e,#c8a84b,#7a5c1e);color:#0b0c0f;border:none;border-radius:8px;cursor:pointer;margin-top:6px;font-family:var(--font);letter-spacing:1.5px;text-transform:uppercase;box-shadow:0 2px 12px rgba(200,168,75,.25);transition:all .2s;}
.btn-gold:active{opacity:.85;transform:scale(.99);}
.btn-green{width:100%;padding:11px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#1e3a26,#2e5c3a);color:#6dbf80;border:1px solid rgba(74,140,92,.4);border-radius:8px;cursor:pointer;margin-top:6px;font-family:var(--font);letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.btn-green:active{opacity:.85;}
.btn-red{width:100%;padding:9px;font-size:11px;font-weight:600;background:transparent;color:var(--red);border:1px solid rgba(192,80,80,.35);border-radius:8px;cursor:pointer;margin-top:8px;font-family:var(--font);letter-spacing:1px;text-transform:uppercase;}
.btn-edit{background:rgba(200,168,75,.1);color:var(--gold);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font);margin-right:6px;}

.empty{text-align:center;color:var(--text3);font-size:12px;padding:20px 0;font-style:italic;letter-spacing:.3px;}

/* PLAYER TABLE */
table.players{width:100%;border-collapse:collapse;font-size:12px;}
table.players th{background:var(--bg3);color:var(--gold);font-weight:700;padding:8px 6px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
table.players td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--border2);vertical-align:middle;color:var(--text);}
table.players tr:last-child td{border-bottom:none;}
.name-cell{text-align:left!important;font-weight:600;color:var(--text);}
.chip-inp{width:80px;padding:6px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;text-align:center;background:var(--bg3);color:var(--text);font-family:var(--font);}
.chip-inp:focus{border-color:var(--gold);outline:none;}
.del-btn{background:var(--red-lt);color:var(--red);border:1px solid rgba(192,80,80,.3);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;}
.rebuy-btn{background:rgba(200,168,75,.1);color:var(--gold);border:1px solid var(--border);border-radius:6px;padding:4px 7px;font-size:10px;font-weight:700;cursor:pointer;margin-left:4px;}
.badge{display:inline-block;background:rgba(200,168,75,.1);color:var(--gold);font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:4px;border:1px solid var(--border2);}

.session-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;margin-bottom:12px;
  font-size:11px;font-weight:600;color:var(--gold2);
}
.session-badge .cal{font-size:14px;}

/* RESULT */
.profit{color:#6dbf80;font-weight:700;}
.loss{color:#d07070;font-weight:700;}
.zero{color:var(--text3);}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border2);font-size:13px;}
.summary-row:last-child{border-bottom:none;}
.pot-info{background:linear-gradient(135deg,rgba(200,168,75,.08),rgba(200,168,75,.04));border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:13px;color:var(--gold2);margin-bottom:10px;}
.pot-info span{font-weight:800;font-size:16px;color:var(--gold3);}

/* HOF */
#tab-hof{padding:0;}
.hof-hero{background:linear-gradient(160deg,#080a06 0%,#0f1208 40%,#141a0a 100%);border-radius:var(--radius) var(--radius) 0 0;padding:28px 16px 22px;text-align:center;position:relative;overflow:hidden;border:1px solid var(--border2);border-bottom:none;}
.hof-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 12% 15%,rgba(200,168,75,.6) 0%,transparent 100%),radial-gradient(1px 1px at 85% 20%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 40% 60%,rgba(200,168,75,.4) 0%,transparent 100%),radial-gradient(1px 1px at 70% 75%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(1px 1px at 25% 85%,rgba(200,168,75,.5) 0%,transparent 100%),radial-gradient(2px 2px at 55% 35%,rgba(200,168,75,.7) 0%,transparent 100%);pointer-events:none;}
.hof-hero::after{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,rgba(200,168,75,.12) 0%,transparent 70%);pointer-events:none;}
.hof-crown{font-size:42px;display:block;margin-bottom:8px;position:relative;z-index:1;filter:drop-shadow(0 0 18px rgba(200,168,75,.8));animation:crownFloat 3.5s ease-in-out infinite;}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-6px) rotate(1deg);}}
.hof-eyebrow{font-size:9px;font-weight:600;letter-spacing:6px;color:rgba(200,168,75,.5);text-transform:uppercase;margin-bottom:4px;position:relative;z-index:1;}
.hof-title{font-weight:800;font-size:24px;letter-spacing:5px;background:linear-gradient(135deg,#7a5c1e 0%,#c8a84b 25%,#f5e09a 50%,#c8a84b 75%,#7a5c1e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 10px rgba(200,168,75,.4));position:relative;z-index:1;margin-bottom:4px;}
.hof-suits{display:flex;justify-content:center;gap:12px;position:relative;z-index:1;margin-top:8px;}
.hof-suits span{font-size:14px;color:var(--gold);opacity:.3;animation:suitP 2.5s ease-in-out infinite;}
.hof-suits span:nth-child(1){color:#c8564a;animation-delay:0s;}
.hof-suits span:nth-child(2){animation-delay:.4s;}
.hof-suits span:nth-child(3){animation-delay:.8s;}
.hof-suits span:nth-child(4){color:#c8564a;animation-delay:1.2s;}
@keyframes suitP{0%,100%{opacity:.2;}50%{opacity:.7;}}
.hof-body{background:var(--bg2);border-radius:0 0 var(--radius) var(--radius);padding:16px;border:1px solid var(--border2);border-top:none;}
.hof-empty{text-align:center;color:var(--text3);font-size:12px;padding:28px 0;font-style:italic;}

/* CALENDAR FILTER UI */
.filter-tabs { display:flex; gap:4px; background:var(--bg3); border-radius:8px; padding:4px; margin-bottom:12px; border:1px solid var(--border2); }
.f-tab { flex:1; text-align:center; padding:8px 4px; font-size:10px; font-weight:700; color:var(--text3); cursor:pointer; border-radius:6px; transition:all .2s; letter-spacing:0.5px; text-transform:uppercase; }
.f-tab.active { background:var(--bg4); color:var(--gold2); box-shadow:0 1px 4px rgba(0,0,0,.2); border:1px solid var(--border); }

.cal-wrapper { background:var(--bg3); border-radius:10px; border:1px solid var(--border); padding:12px; margin-bottom:16px; }
.cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.cal-header button { background:rgba(200,168,75,.1); border:1px solid var(--border2); color:var(--gold); font-size:16px; cursor:pointer; padding:2px 10px; border-radius:6px; }
.cal-header span { font-size:12px; font-weight:700; color:var(--gold2); letter-spacing:1px; text-transform:uppercase; }
.cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; text-align:center; }
.cal-wd { font-size:9px; color:var(--text3); text-transform:uppercase; font-weight:700; margin-bottom:6px; }
.cal-day { position:relative; height:32px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; border-radius:6px; background:var(--bg4); border:1px solid transparent; cursor:pointer; color:var(--text2); transition:all .15s; }
.cal-day.empty { background:transparent; pointer-events:none; }
.cal-day:hover:not(.empty) { background:rgba(200,168,75,.1); }
.cal-day.has-data { border-color:rgba(200,168,75,.3); color:var(--text); background:linear-gradient(135deg, rgba(200,168,75,.15), rgba(200,168,75,.05)); }
.cal-day.has-data::after { content:'🏆'; position:absolute; top:-5px; right:-5px; font-size:10px; filter:drop-shadow(0 0 2px rgba(0,0,0,.5)); }
.cal-day.selected { border-color:var(--gold); box-shadow:0 0 8px var(--gold-glow); background:var(--gold); color:#000; }
.cal-day.selected::after { content:''; display:none; }

/* RANK CARDS */
.rank-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.rank-card{border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.rank-1{background:linear-gradient(135deg,rgba(50,36,6,.95),rgba(30,22,4,.98));border:1.5px solid rgba(200,168,75,.6);box-shadow:0 0 20px rgba(200,168,75,.15),inset 0 1px 0 rgba(200,168,75,.2);}
.rank-1::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,168,75,.06) 0%,transparent 55%);pointer-events:none;}
.rank-2{background:linear-gradient(135deg,rgba(28,30,34,.95),rgba(20,22,26,.98));border:1.5px solid rgba(160,175,195,.3);}
.rank-3{background:linear-gradient(135deg,rgba(40,22,8,.95),rgba(28,16,5,.98));border:1.5px solid rgba(180,110,55,.4);}
.rank-win{background:var(--bg3);border:1px solid rgba(74,140,92,.3);}
.rank-loss{background:var(--bg3);border:1px solid rgba(192,80,80,.25);}
.rank-even{background:var(--bg3);border:1px solid var(--border2);}
.medal{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.rank-1 .medal{background:linear-gradient(145deg,#c8a84b,#8a6a20);box-shadow:0 0 14px rgba(200,168,75,.5);}
.rank-2 .medal{background:linear-gradient(145deg,#b0b8c8,#707888);}
.rank-3 .medal{background:linear-gradient(145deg,#b07840,#6a4020);}
.rank-win .medal,.rank-loss .medal,.rank-even .medal{background:var(--bg4);border:1px solid var(--border);font-size:14px;width:34px;height:34px;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.rank-1 .rank-name{color:var(--gold2);font-size:17px;text-shadow:0 0 12px rgba(200,168,75,.4);}
.rank-2 .rank-name{color:#c8d4e4;}
.rank-3 .rank-name{color:#c89060;}
.rank-win .rank-name{color:#7dd890;}
.rank-loss .rank-name{color:#e08888;}
.rank-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.rank-amt{font-weight:800;font-size:16px;white-space:nowrap;text-align:right;}
.rank-1 .rank-amt{color:var(--gold2);font-size:19px;text-shadow:0 0 10px rgba(200,168,75,.4);}
.rank-2 .rank-amt{color:#9aaabb;}
.rank-3 .rank-amt{color:#b08050;}
.rank-win .rank-amt{color:#6dbf80;}
.rank-loss .rank-amt{color:#d07070;}
.rank-even .rank-amt{color:var(--text3);font-size:13px;}
.rank-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.03);border-radius:0 0 10px 10px;overflow:hidden;}
.rank-bar-fill{height:100%;width:0;transition:width 1s cubic-bezier(.4,0,.2,1);}
.rank-1 .rank-bar-fill{background:linear-gradient(90deg,#7a5c1e,#c8a84b,#f0d878);}
.rank-2 .rank-bar-fill{background:linear-gradient(90deg,#505868,#a0b0c8);}
.rank-3 .rank-bar-fill{background:linear-gradient(90deg,#603820,#a07040);}
.rank-win .rank-bar-fill{background:linear-gradient(90deg,#2a5c34,#4a9c5c);}
.rank-loss .rank-bar-fill{background:linear-gradient(90deg,#6a2020,#a04040);}
.rank-even .rank-bar-fill{background:var(--border);}
.rank-sparkle{position:absolute;top:8px;right:10px;font-size:13px;animation:sp 2.2s ease-in-out infinite;}
@keyframes sp{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.35);}}
.rank-divider{display:flex;align-items:center;gap:8px;margin:10px 0;}
.rank-divider::before,.rank-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(192,80,80,.4),transparent);}
.rank-divider span{font-size:9px;color:rgba(192,80,80,.6);letter-spacing:3px;white-space:nowrap;text-transform:uppercase;font-weight:600;}
.hof-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px;}
.hof-stat{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 12px;text-align:center;}
.hof-stat-label{font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;opacity:.7;font-weight:600;}
.hof-stat-val{font-size:16px;font-weight:800;color:var(--gold2);}
.hof-stat-val.green{color:#6dbf80;}.hof-stat-val.red{color:#d07070;}

/* MEMBERS */
.member-list-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.member-list-item:active{border-color:var(--border);background:var(--bg4);}
.member-avatar{width:42px;height:42px;border-radius:50%;background:var(--bg4);color:var(--gold);border:1px solid var(--border);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.member-meta{flex:1;min-width:0;}
.member-name{font-weight:700;font-size:14px;color:var(--text);}
.member-stats-row{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.stat-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;}
.pill-gold{background:rgba(200,168,75,.12);color:var(--gold);border:1px solid var(--border2);}
.pill-green{background:var(--green-lt);color:#6dbf80;border:1px solid rgba(74,140,92,.2);}
.pill-red{background:var(--red-lt);color:#d07070;border:1px solid rgba(192,80,80,.2);}
.pill-gray{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border2);}
.member-arrow{color:var(--text3);font-size:18px;}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,rgba(50,36,6,.9),rgba(20,15,4,.95));border:1px solid var(--border);border-radius:12px;padding:20px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;}
.profile-avatar-lg{width:56px;height:56px;border-radius:50%;background:var(--bg4);border:2px solid var(--border);color:var(--gold2);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 14px var(--gold-glow);}
.profile-name{font-size:20px;font-weight:800;color:var(--text);}
.profile-since{font-size:10px
