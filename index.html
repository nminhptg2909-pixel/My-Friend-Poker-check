<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♠ GARINI Poker Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #0b0c0f;
  --bg2:       #111318;
  --bg3:       #181a20;
  --bg4:       #1e2028;
  --border:    rgba(200,168,75,.28);
  --border2:   rgba(200,168,75,.12);
  --gold:      #c8a84b;
  --gold2:     #e8c96a;
  --gold3:     #f5e09a;
  --gold-glow: rgba(200,168,75,.18);
  --text:      #ffffff;
  --text2:     rgba(255,255,255,.75);
  --text3:     rgba(255,255,255,.4);
  --green:     #4a8c5c;
  --green-lt:  rgba(74,140,92,.15);
  --red:       #c05050;
  --red-lt:    rgba(192,80,80,.15);
  --radius:    10px;
  --font:      'Montserrat', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  padding:14px;
  color:var(--text);
  max-width:500px;
  margin:0 auto;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(45deg,rgba(200,168,75,.025) 0px,transparent 1px,transparent 18px,rgba(200,168,75,.025) 19px),
    repeating-linear-gradient(-45deg,rgba(200,168,75,.025) 0px,transparent 1px,transparent 18px,rgba(200,168,75,.025) 19px);
}
body>*{position:relative;z-index:1;}

/* HEADER */
.app-header{text-align:center;padding:18px 0 14px;margin-bottom:4px;}
.app-logo{font-size:10px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--gold);opacity:.6;margin-bottom:6px;}
.app-title{
  font-size:28px;font-weight:800;letter-spacing:4px;
  background:linear-gradient(135deg,#9a7830 0%,#c8a84b 25%,#f0d878 50%,#c8a84b 75%,#9a7830 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(200,168,75,.3));
}
.app-divider{display:flex;align-items:center;gap:10px;margin:10px auto 0;max-width:260px;}
.app-divider::before,.app-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.app-divider-icon{font-size:11px;color:var(--gold);opacity:.5;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px;}
.tab{flex:1;padding:8px 2px;font-size:10px;font-weight:700;text-align:center;border-radius:7px;cursor:pointer;background:transparent;color:var(--text3);transition:all .2s;letter-spacing:.5px;text-transform:uppercase;font-family:var(--font);border:1px solid transparent;}
.tab.active{background:linear-gradient(135deg,#1e1a0e,#2a2210);color:var(--gold2);border-color:var(--border);box-shadow:0 0 12px var(--gold-glow);}
.page{display:none;}.page.show{display:block;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border2);opacity:.85;}

/* FORM & INPUTS */
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
input[type=text],input[type=number],input[type=date]{
  flex:1;padding:9px 12px;font-size:13px;font-weight:500;
  border:1px solid var(--border);border-radius:8px;
  background:var(--bg3);color:var(--text);font-family:var(--font);
}
input:focus{border-color:var(--gold);outline:none;background:var(--bg4);box-shadow:0 0 8px var(--gold-glow);}

.btn-gold{width:100%;padding:11px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#7a5c1e,#c8a84b,#7a5c1e);color:#0b0c0f;border:none;border-radius:8px;cursor:pointer;margin-top:6px;font-family:var(--font);letter-spacing:1.5px;text-transform:uppercase;}
.btn-green{width:100%;padding:11px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#1e3a26,#2e5c3a);color:#6dbf80;border:1px solid rgba(74,140,92,.4);border-radius:8px;cursor:pointer;}
.btn-red{width:100%;padding:9px;font-size:11px;font-weight:600;background:transparent;color:var(--red);border:1px solid rgba(192,80,80,.35);border-radius:8px;cursor:pointer;}

/* MEMBER GRID */
.member-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.member-chip{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;}
.member-chip.selected{background:linear-gradient(135deg,#1e1a0e,#2a2210);color:var(--gold2);border-color:var(--gold);}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--bg4);color:var(--gold);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}

/* TABLES */
table.players{width:100%;border-collapse:collapse;font-size:12px;}
table.players th{background:var(--bg3);color:var(--gold);padding:8px 6px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
table.players td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--border2);color:var(--text);}
.name-cell{text-align:left!important;font-weight:600;}

/* RESULT */
.profit{color:#6dbf80;font-weight:700;}
.loss{color:#d07070;font-weight:700;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border2);font-size:13px;}
.pot-info{background:linear-gradient(135deg,rgba(200,168,75,.08),rgba(200,168,75,.04));border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:13px;color:var(--gold2);margin-bottom:10px;}
.pot-info span{font-weight:800;font-size:16px;color:var(--gold3);}

/* HOF & STATS */
.hof-hero{background:linear-gradient(160deg,#080a06 0%,#141a0a 100%);border-radius:var(--radius);padding:28px 16px;text-align:center;border:1px solid var(--border2);}
.hof-crown{font-size:42px;display:block;margin-bottom:8px;animation:crownFloat 3.5s ease-in-out infinite;}
@keyframes crownFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.hof-title{font-weight:800;font-size:24px;letter-spacing:5px;background:linear-gradient(135deg,#c8a84b 0%,#f5e09a 50%,#c8a84b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.rank-card{border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;position:relative;}
.rank-1{background:linear-gradient(135deg,rgba(50,36,6,.95),rgba(30,22,4,.98));border:1.5px solid rgba(200,168,75,.6);}
.rank-win{background:var(--bg3);border:1px solid rgba(74,140,92,.3);}
.rank-loss{background:var(--bg3);border:1px solid rgba(192,80,80,.25);}

/* EDIT MODAL SPECIFIC */
.edit-player-row{background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border2);}
.edit-player-row .label{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:6px;display:block;}

/* MODAL GENERAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;}
.modal-box{background:var(--bg2);border-radius:16px;padding:20px;width:100%;max-width:450px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);position:relative;}
.modal-close{position:absolute;top:15px;right:15px;font-size:22px;cursor:pointer;color:var(--text3);}

#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;}
.empty{text-align:center;color:var(--text3);padding:20px;font-style:italic;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;padding-bottom:12px;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="app-header">
  <div class="app-logo">Private Game</div>
  <div class="app-title">♠ GARINI</div>
  <div class="app-divider"><span class="app-divider-icon">◆</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('game')">🎮 Game</div>
  <div class="tab" onclick="showTab('result')">Kết quả</div>
  <div class="tab" onclick="showTab('hof')">🏆 Fame</div>
  <div class="tab" onclick="showTab('members')">Hội viên</div>
</div>

<div class="page show" id="tab-game">
  <div class="card">
    <div class="card-title">Chọn người chơi</div>
    <div class="member-grid" id="memberGrid"></div>
    <div class="form-row"><input type="text" id="nameInp" placeholder="Tên người chơi..."></div>
    <div class="form-row"><input type="number" id="buyInp" placeholder="Số hand mua (VD: 3)..."></div>
    <button class="btn-gold" onclick="addPlayer()">+ Thêm vào bàn</button>
  </div>
  <div class="card">
    <div class="card-title">Bàn hiện tại (Ngày: <input type="date" id="sessionDate" style="width:130px;padding:2px;font-size:11px;">)</div>
    <div id="playerList"></div>
  </div>
</div>

<div class="page" id="tab-result">
  <div id="resultMainView">
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Cash Out</span>
        <button onclick="showSessionHistory()" style="font-size:10px;background:none;border:1px solid var(--gold);color:var(--gold);padding:4px 8px;border-radius:4px;cursor:pointer;">🕒 Lịch sử</button>
      </div>
      <div id="cashoutList"></div>
      <button class="btn-green" onclick="calcResult()" style="margin-top:10px;width:100%;">Tính kết quả</button>
    </div>
    <div class="card" id="summaryCard" style="display:none">
      <div id="summaryList"></div>
      <button class="btn-green" onclick="saveSession()" style="width:100%;margin-top:10px;">💾 Lưu buổi chơi</button>
      <button class="btn-red" onclick="resetAll()" style="width:100%;margin-top:8px;">Reset bàn mới</button>
    </div>
  </div>
  <div id="sessionHistoryView" style="display:none">
    <button class="back-btn" onclick="hideSessionHistory()">‹ Quay lại</button>
    <div id="sessionHistoryList"></div>
  </div>
</div>

<div class="page" id="tab-hof">
  <div class="hof-hero">
    <span class="hof-crown">👑</span>
    <div class="hof-title">HALL OF FAME</div>
  </div>
  <div id="hofList" style="margin-top:15px;"></div>
</div>

<div class="page" id="tab-members">
  <div id="memberListView">
    <div class="card">
      <div class="card-title">Hội viên</div>
      <div id="memberListEl"></div>
      <button class="btn-gold" onclick="showAddModal()">+ Thêm hội viên</button>
    </div>
    <div class="card">
        <div class="card-title">📦 Đồng bộ dữ liệu</div>
        <div style="display:flex;gap:8px;">
            <button class="btn-gold" onclick="exportData()" style="flex:1;font-size:10px;">📤 Xuất mã</button>
            <button class="btn-gold" onclick="importData()" style="flex:1;font-size:10px;background:#505868;">📥 Nhập mã</button>
        </div>
    </div>
  </div>
  <div id="memberDetailView" style="display:none"></div>
</div>

<div class="modal-overlay" id="editSessionModal" style="display:none">
  <div class="modal-box">
    <span class="modal-close" onclick="closeEditModal()">✕</span>
    <div class="card-title">Chỉnh sửa buổi chơi</div>
    <div id="editSessionDateRow" style="margin-bottom:15px;"></div>
    <div id="editPlayersContainer"></div>
    <button class="btn-green" onclick="updateSessionData()" style="width:100%;">💾 Lưu thay đổi</button>
  </div>
</div>

<div class="modal-overlay" id="addMemberModal" style="display:none">
  <div class="modal-box">
    <span class="modal-close" onclick="closeAddModal()">✕</span>
    <div class="card-title">Thêm hội viên</div>
    <input type="text" id="newMemberName" placeholder="Tên hội viên..." style="width:100%;margin-bottom:10px;">
    <button class="btn-gold" onclick="addMember()" style="width:100%;">Xác nhận</button>
  </div>
</div>

<script>
var players=[], lastResults=[], selectedMember=null, editingSessionIdx=null;

// INIT
(function(){
  var d=new Date(),pad=function(n){return n<10?'0'+n:n;};
  document.getElementById('sessionDate').value=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  renderMemberGrid();
})();

function loadMembers(){ return JSON.parse(localStorage.getItem('pk_members'))||[]; }
function saveMembers(m){ localStorage.setItem('pk_members',JSON.stringify(m)); }
function loadSessions(){ return JSON.parse(localStorage.getItem('pk_sessions'))||[]; }
function saveSessions(s){ localStorage.setItem('pk_sessions',JSON.stringify(s)); }
function fmtAbs(n){ return n.toLocaleString('vi-VN')+'đ'; }
function initials(name){ return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function getSessionDate(){
  var val=document.getElementById('sessionDate').value;
  if(!val)return '';
  var p=val.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}

function showTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('tab-'+t).classList.add('show');
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if(t==='game') renderMemberGrid();
  if(t==='result') renderCashout();
  if(t==='hof') renderHof();
  if(t==='members') renderMemberList();
}

// GAME LOGIC
function renderMemberGrid(){
  var el=document.getElementById('memberGrid'), m=loadMembers();
  if(!m.length){ el.innerHTML='<div class="empty">Chưa có hội viên</div>'; return; }
  el.innerHTML=m.map(x=>`<div class="member-chip ${selectedMember===x.id?'selected':''}" onclick="selectMember('${x.id}')"><div class="avatar">${initials(x.name)}</div>${x.name}</div>`).join('');
}

function selectMember(id){
  selectedMember = (selectedMember===id)?null:id;
  renderMemberGrid();
  if(selectedMember){ var m=loadMembers().find(x=>x.id===id); document.getElementById('nameInp').value=m.name; }
}

function addPlayer(){
  var n=document.getElementById('nameInp').value.trim(), h=parseInt(document.getElementById('buyInp').value)||0;
  if(!n||h<1)return alert('Nhập đủ tên và hand!');
  players.push({name:n, hands:h, chips:h*2000, memberId:selectedMember});
  document.getElementById('nameInp').value=''; document.getElementById('buyInp').value='';
  selectedMember=null; renderMemberGrid(); renderPlayers();
}

function renderPlayers(){
  var el=document.getElementById('playerList');
  if(!players.length){ el.innerHTML='<div class="empty">Bàn trống</div>'; return; }
  var h='<table class="players"><tr><th>Tên</th><th>Hand</th><th>Chip</th><th></th></tr>';
  players.forEach((p,i)=>{
    h+=`<tr><td class="name-cell">${p.name}</td><td>${p.hands}</td><td>${p.chips.toLocaleString()}</td><td><button class="btn-red" onclick="players.splice(${i},1);renderPlayers()">✕</button></td></tr>`;
  });
  el.innerHTML=h+'</table>';
}

function renderCashout(){
  var el=document.getElementById('cashoutList');
  if(!players.length){ el.innerHTML='<div class="empty">Bàn trống</div>'; return; }
  el.innerHTML=players.map((p,i)=>`<div style="margin-bottom:10px;"><b>${p.name}</b> (Mua ${p.chips.toLocaleString()})<br><input type="number" id="co_${i}" placeholder="Chip còn..." class="chip-inp" style="width:100%;margin-top:5px;"></div>`).join('');
}

function calcResult(){
  lastResults = players.map((p,i)=>{
    var co=parseInt(document.getElementById('co_'+i).value)||0;
    return {name:p.name, buyin:p.chips, cashout:co, diff:Math.round((co-p.chips)/2000*100000), memberId:p.memberId};
  });
  var h='<div class="pot-info">Tổng Pot: <span>'+fmtAbs(lastResults.reduce((s,x)=>s+x.buyin,0)/2000*100000)+'</span></div>';
  lastResults.sort((a,b)=>b.diff-a.diff).forEach(r=>{
    var cls=r.diff>=0?'profit':'loss';
    h+=`<div class="summary-row"><span>${r.name}</span><span class="${cls}">${r.diff>=0?'+':''}${fmtAbs(r.diff)}</span></div>`;
  });
  document.getElementById('summaryList').innerHTML=h;
  document.getElementById('summaryCard').style.display='block';
}

function saveSession(){
  var date=getSessionDate(), sess=loadSessions(), members=loadMembers();
  sess.unshift({id:Date.now(), date:date, results:lastResults});
  saveSessions(sess);
  lastResults.forEach(r=>{
    if(!r.memberId)return;
    var m=members.find(x=>x.id===r.memberId);
    if(m){ if(!m.history)m.history=[]; m.history.unshift({date:date, buyin:r.buyin, cashout:r.cashout, diff:r.diff}); }
  });
  saveMembers(members);
  alert('Đã lưu!'); resetAll(); showTab('hof');
}

function resetAll(){ players=[]; lastResults=[]; document.getElementById('summaryCard').style.display='none'; renderPlayers(); }

// HISTORY & EDIT LOGIC
function showSessionHistory(){
  document.getElementById('resultMainView').style.display='none';
  document.getElementById('sessionHistoryView').style.display='block';
  renderSessionHistory();
}

function hideSessionHistory(){
  document.getElementById('resultMainView').style.display='block';
  document.getElementById('sessionHistoryView').style.display='none';
}

function renderSessionHistory(){
  var sess=loadSessions(), el=document.getElementById('sessionHistoryList');
  if(!sess.length){ el.innerHTML='<div class="empty">Chưa có lịch sử</div>'; return; }
  el.innerHTML=sess.map((s,i)=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border2);padding-bottom:5px;margin-bottom:8px;">
        <b style="color:var(--gold2)">📅 ${s.date}</b>
        <div>
          <button onclick="editSession(${i})" style="color:var(--gold);background:none;border:none;font-size:11px;cursor:pointer;margin-right:10px;">Sửa</button>
          <button onclick="deleteSession(${i})" style="color:var(--red);background:none;border:none;font-size:11px;cursor:pointer;">Xóa</button>
        </div>
      </div>
      ${s.results.map(r=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin:3px 0;"><span>${r.name}</span><span class="${r.diff>=0?'profit':'loss'}">${r.diff>=0?'+':''}${fmtAbs(r.diff)}</span></div>`).join('')}
    </div>
  `).join('');
}

function editSession(idx){
  editingSessionIdx = idx;
  var sess = loadSessions()[idx];
  document.getElementById('editSessionDateRow').innerHTML = `<b>Ngày chơi:</b> <input type="text" id="editDate" value="${sess.date}" style="padding:4px;width:100px;">`;
  var h = sess.results.map((r, i)=>`
    <div class="edit-player-row">
      <span class="label">Người chơi ${i+1}</span>
      <div class="form-row"><input type="text" id="ed_name_${i}" value="${r.name}" placeholder="Tên"></div>
      <div class="form-row">
        <div style="flex:1"><span style="font-size:9px;color:var(--text3)">Buy-in (Hand)</span><input type="number" id="ed_buy_${i}" value="${r.buyin/2000}"></div>
        <div style="flex:1"><span style="font-size:9px;color:var(--text3)">Chip còn lại</span><input type="number" id="ed_co_${i}" value="${r.cashout}"></div>
      </div>
    </div>
  `).join('');
  document.getElementById('editPlayersContainer').innerHTML = h;
  document.getElementById('editSessionModal').style.display = 'flex';
}

function updateSessionData(){
  var sessArr=loadSessions(), members=loadMembers(), s=sessArr[editingSessionIdx];
  var oldDate = s.date, newDate = document.getElementById('editDate').value;
  
  s.date = newDate;
  s.results.forEach((r, i)=>{
    var oldBuy = r.buyin, oldDiff = r.diff;
    r.name = document.getElementById('ed_name_'+i).value;
    var newHands = parseInt(document.getElementById('ed_buy_'+i).value)||0;
    r.buyin = newHands * 2000;
    r.cashout = parseInt(document.getElementById('ed_co_'+i).value)||0;
    r.diff = Math.round((r.cashout - r.buyin)/2000*100000);
    
    // Cập nhật vào profile hội viên
    var m = members.find(x=>x.name === r.name || x.id === r.memberId);
    if(m && m.history){
        var hIdx = m.history.findIndex(h=>h.date === oldDate && h.buyin === oldBuy && h.diff === oldDiff);
        if(hIdx !== -1) m.history[hIdx] = {date:newDate, buyin:r.buyin, cashout:r.cashout, diff:r.diff};
    }
  });
  
  saveSessions(sessArr); saveMembers(members);
  alert('Đã cập nhật!'); closeEditModal(); renderSessionHistory();
}

function deleteSession(idx){
  if(!confirm('Xóa buổi chơi này?'))return;
  var sess=loadSessions(), members=loadMembers(), del=sess[idx];
  del.results.forEach(r=>{
    var m=members.find(x=>x.name===r.name);
    if(m&&m.history){ var hi=m.history.findIndex(h=>h.date===del.date&&h.diff===r.diff); if(hi!==-1)m.history.splice(hi,1); }
  });
  sess.splice(idx,1); saveSessions(sess); saveMembers(members); renderSessionHistory();
}

function closeEditModal(){ document.getElementById('editSessionModal').style.display='none'; }

// HOF & MEMBERS
function renderHof(){
  var m=loadMembers(), res=[];
  m.forEach(x=>{
    if(!x.history||!x.history.length)return;
    var d=x.history.reduce((s,h)=>s+h.diff,0), b=x.history.reduce((s,h)=>s+h.buyin,0);
    res.push({name:x.name, diff:d, buyin:b});
  });
  if(!res.length){ document.getElementById('hofList').innerHTML='<div class="empty">Chưa có dữ liệu</div>'; return; }
  res.sort((a,b)=>b.diff-a.diff);
  document.getElementById('hofList').innerHTML = res.map((r,i)=>`
    <div class="rank-card ${i===0?'rank-1':r.diff>=0?'rank-win':'rank-loss'}">
      <div style="font-weight:800;font-size:18px;color:var(--gold)">${i+1}</div>
      <div style="flex:1"><b>${r.name}</b><br><small>Tổng mua: ${r.buyin.toLocaleString()}</small></div>
      <div class="${r.diff>=0?'profit':'loss'}">${r.diff>=0?'+':''}${fmtAbs(r.diff)}</div>
    </div>
  `).join('');
}

function renderMemberList(){
  var m=loadMembers(), el=document.getElementById('memberListEl');
  if(!m.length){ el.innerHTML='<div class="empty">Chưa có hội viên</div>'; return; }
  el.innerHTML=m.map(x=>{
    var total = (x.history||[]).reduce((s,h)=>s+h.diff,0);
    return `<div class="member-list-item" onclick="showMemberDetail('${x.id}')">
      <div class="member-avatar">${initials(x.name)}</div>
      <div style="flex:1"><b>${x.name}</b><br><small>${(x.history||[]).length} trận</small></div>
      <div class="${total>=0?'profit':'loss'}">${total>=0?'+':''}${fmtAbs(total)}</div>
    </div>`;
  }).join('');
}

function showMemberDetail(id){
  var m=loadMembers().find(x=>x.id===id);
  var h = `<button class="back-btn" onclick="showTab('members')">‹ Danh sách</button>
    <div class="hof-hero" style="padding:15px;margin-bottom:15px;"><h3>${m.name}</h3></div>
    <div class="card"><div class="card-title">Lịch sử</div>
    ${(m.history||[]).map(x=>`<div class="summary-row"><span>${x.date}</span><span class="${x.diff>=0?'profit':'loss'}">${fmtAbs(x.diff)}</span></div>`).join('')}
    </div><button class="btn-red" style="width:100%" onclick="deleteMember('${id}')">Xóa hội viên</button>`;
  document.getElementById('memberListView').style.display='none';
  document.getElementById('memberDetailView').innerHTML=h;
  document.getElementById('memberDetailView').style.display='block';
}

function deleteMember(id){ if(confirm('Xóa hội viên này?')){ var m=loadMembers().filter(x=>x.id!==id); saveMembers(m); showTab('members'); } }
function showAddModal(){ document.getElementById('addMemberModal').style.display='flex'; }
function closeAddModal(){ document.getElementById('addMemberModal').style.display='none'; }
function addMember(){
  var n=document.getElementById('newMemberName').value.trim(), m=loadMembers();
  if(!n)return; m.push({id:'m_'+Date.now(), name:n, history:[]});
  saveMembers(m); closeAddModal(); renderMemberList();
}

function exportData(){
    var d = {m: localStorage.getItem('pk_members'), s: localStorage.getItem('pk_sessions')};
    prompt('Copy mã này sang thiết bị khác:', btoa(JSON.stringify(d)));
}
function importData(){
    var code = prompt('Dán mã đồng bộ vào đây:'); if(!code)return;
    try {
        var d = JSON.parse(atob(code));
        localStorage.setItem('pk_members', d.m); localStorage.setItem('pk_sessions', d.s);
        location.reload();
    } catch(e){alert('Mã sai!');}
}

function launchConfetti(){
  var cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;cv.style.display='block';
  var cols=['#c8a84b','#f0d878','#ffffff'];
  var ps=Array.from({length:60},()=>({x:Math.random()*cv.width,y:-20,r:Math.random()*3+2,d:Math.random()*2+1,c:cols[Math.floor(Math.random()*cols.length)]}));
  var t=0; (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{ p.y+=p.d; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); });
    if(t++<150)requestAnimationFrame(draw); else cv.style.display='none';
  })();
}
</script>
